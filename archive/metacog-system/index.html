<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>元认知系统 — Metacog System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0d1117;color:#c9d1d9;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 20px;flex-shrink:0}
#tabs button{background:none;border:none;color:#8b949e;padding:14px 24px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
#tabs button:hover{color:#c9d1d9}
#tabs button.active{color:#f0f6fc;border-bottom-color:#58a6ff}
#iframe-container{flex:1;position:relative}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
#status{background:#161b22;border-top:1px solid #30363d;padding:8px 20px;font-size:11px;color:#484f58;flex-shrink:0;display:flex;justify-content:space-between}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.dot.active{background:#3fb950}.dot.idle{background:#484f58}
</style>
</head>
<body>
<div id="tabs">
  <button class="active" onclick="switchTab('meta')">🧠 元认知图谱</button>
  <button onclick="switchTab('know')">📚 知识图谱</button>
  <button onclick="switchTab('learn')">📖 学习中图谱</button>
</div>
<div id="iframe-container">
  <iframe id="f-meta" class="active" src="metacognition-mapper.html"></iframe>
  <iframe id="f-know" src="knowledge-mapper.html"></iframe>
  <iframe id="f-learn" src="learning-mapper.html"></iframe>
</div>
<div id="status">
  <span>
    <span class="dot active"></span> 元认知 24节点 · 
    <span class="dot active"></span> 知识 39节点 · 
    <span class="dot active"></span> 学习中 62节点
  </span>
  <span>automation: 每4-6h自动蒸馏 · 双击任意子页面也可单独打开</span>
</div>
<script>
function switchTab(name){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f=>f.classList.remove('active'));
  document.getElementById('f-'+name).classList.add('active');
  document.querySelector('#tabs button:nth-child('+(name==='meta'?1:name==='know'?2:3)+')').classList.add('active');
}
</script>
</body>
</html>
