<h2>🧠 Metacognition Mapper</h2><div class="subtitle" id="stats">loading</div><input id="search-box" placeholder="🔍 搜索节点..." style="width:100%;margin-top:8px;padding:6px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;outline:none;font-family:inherit" oninput="searchNodes(this.value)"></div>

<script>
var svg=d3.select("svg"),g=svg.append("g");
var zoom=d3.zoom().scaleExtent([0.1,8]).on("zoom",function(e){g.attr("transform",e.transform)});svg.call(zoom);
var s,gn=[],ge=[];
var tl={"domain":"Domain","belief":"Belief","decision":"Decision","bias":"Bias","strategy":"Strategy","emotion":"Emotion","evidence":"Evidence","source":"Source","meta":"Meta"};
var rl={"supports":"supports","conflicts":"conflicts","derives_from":"from","influences":"influences","avoids":"avoids","corrects":"corrects","questions":"questions"};
var cl={certain:"certain",likely:"likely",speculative:"speculative"};
function nr(d){var m={"domain":15,"belief":13,"decision":12,"bias":11,"strategy":10,"emotion":9,"evidence":9,"source":9,"meta":12};return m[d.type]||10}
function r(data){
g.selectAll("*").remove();
gn=data.nodes.map(n=>Object.assign({},n));
ge=data.edges.map(e=>Object.assign({},e));
document.getElementById("stats").textContent=gn.length+" nodes · "+ge.length+" edges";
var lk=g.append("g").selectAll("line").data(ge).join("line").attr("class",d=>"edge "+(d.type||"influences")).attr("stroke-width",1.4);
var nd=g.append("g").selectAll("g").data(gn).join("g").attr("class",d=>"node "+(d.type||"domain")).call(d3.drag().on("start",(e,d)=>{if(!e.active)s.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)s.alphaTarget(0);d.fx=null;d.fy=null})).on("mouseenter",function(e,d){focusNode(d,nd,lk);sd(d)});
nd.append("circle").attr("r",nr).on("mouseenter",function(e,d){d3.select(this).transition().duration(150).attr("r",nr(d)+5)}).on("mouseleave",function(e,d){d3.select(this).transition().duration(150).attr("r",nr(d))});
nd.append("text").text(d=>d.label).style("font-family",'"PingFang SC","Microsoft YaHei",sans-serif');
var W=document.getElementById("graph-panel").clientWidth,H=document.getElementById("graph-panel").clientHeight;
s=d3.forceSimulation(gn).force("link",d3.forceLink(ge).id(d=>d.id).distance(d=>{var ds={"supports":130,"derives_from":150,"conflicts":200,"influences":170,"avoids":180,"corrects":140,"questions":160};return ds[d.type]||160}).strength(0.4)).force("charge",d3.forceManyBody().strength(-600).distanceMax(600)).force("center",d3.forceCenter(W/2,H/2)).force("collision",d3.forceCollide().radius(d=>nr(d)+20)).alphaDecay(0.015).on("tick",()=>{lk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);nd.attr("transform",d=>"translate("+d.x+","+d.y+")")})}}
function focusNode(d,nd,lk){
g.selectAll(".node").classed("linked",false);
g.selectAll(".edge").classed("linked",false);
var connected=new Set([d.id]);
ge.forEach(e=>{var s=e.source.id||e.source;var t=e.target.id||e.target;if(s===d.id)connected.add(t);if(t===d.id)connected.add(s)});
nd.classed("linked",n=>connected.has(n.id)&&n.id!==d.id);
lk.classed("linked",e=>{var s=e.source.id||e.source;var t=e.target.id||e.target;return s===d.id||t===d.id});
}
function sd(d){
var el=document.getElementById("detail-content");
var rs=ge.filter(e=>(e.source.id||e.source)===d.id||(e.target.id||e.target)===d.id);
var h="";
h+='<div class="detail-block"><h3>'+tl[d.type]+' · '+cl[d.confidence]+' · depth '+d.depth+'</h3>';
h+='<p style="font-size:18px;font-weight:600;color:#f0f6fc;margin-bottom:6px;">'+d.label+'</p>';
if(d.summary)h+='<div class="detail-block"><h3>Description</h3><p>'+d.summary+'</p></div>';
if(d.wiki_description)h+='<div class="ext-desc"><div class="src">📖 Wikipedia</div>'+d.wiki_description+'</div>';
if(d.baidu_description)h+='<div class="ext-desc"><div class="src">🔍 Baidu</div>'+d.baidu_description+'</div>';
if(rs.length>0){
var out=rs.filter(e=>(e.source.id||e.source)===d.id);
var inp=rs.filter(e=>(e.target.id||e.target)===d.id&&(e.source.id||e.source)!==d.id);
h+='<div class="detail-block"><h3>→ 向外链接 ('+out.length+')</h3>';
out.forEach(e=>{var o=gn.find(n=>n.id===e.target.id);h+='<div class="edge-mini">→ <span class="em-label">'+(o?o.label:e.target.id)+'</span> <span style="color:#484f58">'+rl[e.type]+'</span></div>'});
h+='</div>';
h+='<div class="detail-block"><h3>← 反向链接 ('+inp.length+')</h3>';
inp.forEach(e=>{var o=gn.find(n=>n.id===e.source.id);h+='<div class="edge-mini">← <span class="em-label">'+(o?o.label:e.source.id)+'</span> <span style="color:#484f58">'+rl[e.type]+'</span></div>'});
h+='</div>';
}
el.innerHTML=h;}
svg.on("click",()=>{g.selectAll(".node").classed("linked",false);g.selectAll(".edge").classed("linked",false)});
window.addEventListener("resize",()=>{if(s){var W=document.getElementById("graph-panel").clientWidth,H=document.getElementById("graph-panel").clientHeight;s.force("center",d3.forceCenter(W/2,H/2));s.alpha(0.3).restart()}});
function zI(){svg.transition().duration(300).call(zoom.scaleBy,1.3)}
function zO(){svg.transition().duration(300).call(zoom.scaleBy,0.7)}
function zR(){svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity)}
var nfm = {};
function searchNodes(q){
q=q.toLowerCase();if(!q){document.getElementById("detail-content").innerHTML='<div class="empty">👆 hover node to view details</div>';g.selectAll(".node").classed("linked",false);g.selectAll(".edge").classed("linked",false);return}
var matches=gn.filter(n=>n.label.toLowerCase().includes(q)||(n.summary||'').toLowerCase().includes(q));
var h='<div class="detail-block"><h3>搜索结果 ('+matches.length+')</h3>';
matches.forEach(n=>{
h+='<div style="padding:4px 0;border-bottom:1px solid #21262d;cursor:pointer" onclick="sd(gn.find(g=>g.id===\''+n.id+'\'))"><span style="color:#58a6ff">'+n.label+'</span><br><span style="font-size:11px;color:#8b949e">'+(n.summary||'').slice(0,80)+'</span></div>';
});
h+='</div>';document.getElementById("detail-content").innerHTML=h;}
var ed = {"user_id":"mu","created":"2026-06-13T16:30:00","last_distilled":"2026-06-20T17:30:00","total_distillations":17,"nodes":[{"id":"n1","label":"收敛型思维","type":"strategy","depth":1,"confidence":"certain","summary":"【元认知含义】倾向于从宽泛探索快速收敛到单一具体方案，而非长期保持发散探索。在认知效率上表现为'搜索→评估→决策→执行'的短链路。这既是优势（快速产出）也可能有盲区（过早收敛可能遗漏更优方案）。\n\n【证据链】D1-D5持续强化：GitHub工具列表→打包EXE→嵌入agent→蒸馏管线→全量导入DeepSeek数据，每一步都缩小范围。跨平台证据：DeepSeek 16个月学习弧线从Python基础→嵌入式驱动→系统构建，同样是收敛模式。","wiki_description":"","baidu_description":""},{"id":"n2","label":"高自主性需求","type":"meta","depth":1,"confidence":"certain","summary":"【元认知含义】强烈偏好系统自动工作而非需要用户持续参与。这超越了普通的'方便'需求，表现为一种元层级的控制偏好：不仅控制自己在做什么，还要控制AI在做什么、AI如何编排其他AI。\n\n【证据链】连续³拒绝提问式挖掘方案，选择观测式('不用自己整理')→要求后台定时蒸馏('后台挂一个')→要求嵌入agent('嵌入到相关agent')→'帮我看着mimo做事'——从控制自己到控制AI到AI监督AI的递进。","wiki_description":"","baidu_description":""},{"id":"n3","label":"抽象→具象快速切换","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】在抽象概念讨论和具体可执行方案之间快速切换的能力。表现为讨论概念后立即追问'怎么实现'，并将抽象思维策略外化为AI可执行的指令。\n\n【证据链】多次出现：'记忆化剪枝那样你懂吗'(抽象策略→AI指令)→讨论蒸馏概念后立即要求'打包成EXE放到D盘'→讨论agent体系后立即要求创建automation。","wiki_description":"","baidu_description":""},{"id":"n4","label":"工具控制欲","type":"meta","depth":1,"confidence":"certain","summary":"【元认知含义】不满足于使用工具，追求对工具的完全控制——包括工具的行为、工具的配置、工具之间的编排。表现为不断扩展控制域：从控制自己使用的工具→控制AI的行为→控制AI编排其他AI。\n\n【证据链】D3升级(likely→certain)：要求打包EXE指定目录→要求嵌入agent→要求自动化定时→监控mimo做事→要求蒸馏所有历史对话。控制域从文件系统扩展到agent体系再扩展到跨AI编排。","wiki_description":"","baidu_description":""},{"id":"n5","label":"主动蒸馏意识","type":"meta","depth":1,"confidence":"certain","summary":"【元认知含义】能够将自身的认知过程外化为可操作的技术概念——这是强元认知的标志。不仅意识到自己在思考，还能将'思考过程'本身建模为可处理的数据流(知识蒸馏类比)。\n\n【证据链】两次主动提出蒸馏类比：首次在讨论元认知可视化时('是不是有点像蒸馏了')，第二次在嵌入agent时再次确认。这种类比不是AI引导的，是用户主动将机器学习概念应用到认知科学领域。","wiki_description":"","baidu_description":""},{"id":"n6","label":"验证习惯","type":"strategy","depth":1,"confidence":"certain","summary":"【元认知含义】对AI输出的系统性验证行为——不只是信任输出，而是要求可重复、可检查的证据。体现在每次操作后都要求确认结果。\n\n【证据链】跨平台持续出现：DeepSeek中'重新再搜索再评估，不是在你训练数据中的'→CodeWhale中每次文件操作后要求验证(端口测试、API响应检查、文件完整性确认)。在构建蒸馏管线时每个步骤都要求验证。","wiki_description":"","baidu_description":""},{"id":"n7","label":"元认知可视化探索","type":"domain","depth":0,"confidence":"certain","summary":"【元认知含义】主动寻求将内在认知过程外化和可视化的需求——这是元认知意识的外在表现。不仅是'想知道自己在想什么'，而是'想把思维变成可操作的图谱'。\n\n【证据链】核心会话主题，从搜索GitHub知识图谱工具开始→收敛到构建自己的蒸馏系统→最终形成双库(元认知+知识)体系。16个月的AI使用史中，这是首次如此系统地处理自身认知模式。","wiki_description":"","baidu_description":""},{"id":"n8","label":"工具集成与自动化","type":"domain","depth":0,"confidence":"certain","summary":"【元认知含义】将离散工具整合为自动化系统的倾向。不同于'使用很多工具'(那是多工具生态)，这是追求工具间的自动编排和零人工干预。\n\n【证据链】从独立EXE→agent嵌入→automation定时任务→双自动化(meta+know)并行。工具从离散到集成的演化路径清晰可追踪。","wiki_description":"","baidu_description":""},{"id":"n9","label":"并行+收敛","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】同时考虑多个方案(并行探索)，但快速收敛到单一最优解。这是一种高效的决策策略——充分利用AI的并行能力，但不陷入选择瘫痪。\n\n【证据链】多轮并行搜索后迅速收敛到具体实现。典型表现：搜索多个工具→同时评估→选最优→立即实现。","wiki_description":"","baidu_description":""},{"id":"n10","label":"系统性架构思维","type":"strategy","depth":1,"confidence":"certain","summary":"【元认知含义】不满足于点状解决方案，追求系统级的架构设计——考虑组件之间的关系、数据流、自动化管道。表现为从'工具'思维到'平台'思维的升级。\n\n【证据链】要求agent嵌入→设计蒸馏管线→双库并行→自动化定时运行。D14强化：项目从临时目录迁移到D:/ai项目/metacog-distiller固定路径，从零散脚本整合为完整系统(clean_garbled.py+update_logs.py+build_final_html.py+自动化管道)。不是'做一个工具'而是'建一个系统'。","wiki_description":"","baidu_description":""},{"id":"n11","label":"先查后建","type":"strategy","depth":1,"confidence":"certain","summary":"【元认知含义】在构建方案之前先检查是否已有现成方案——审慎务实而非闭门造车。但确认没有后不纠结，立即进入构建。\n\n【证据链】跨平台重现：DeepSeek中'搜索一下然后综合评估'(投简历工具)→CodeWhale中'网上有没有已经完成了的开源'(蒸馏系统)。两次都是先查→确认没有→立即自建。","wiki_description":"","baidu_description":""},{"id":"n12","label":"Set-and-forget 偏好","type":"meta","depth":1,"confidence":"likely","summary":"【元认知含义】偏好'配置一次，永远运行'的系统模式。这是一种深层的认知偏好——希望系统在配置完成后不再需要认知负担。\n\n【证据链】'后台挂一个''隔一段时间就自己整理'→automation每4小时运行→双automation并行。本质是对认知资源的最优化分配。","wiki_description":"","baidu_description":""},{"id":"n13","label":"完整性需求","type":"meta","depth":1,"confidence":"likely","summary":"【元认知含义】对覆盖面的明确要求——不是'做一点就好'，而是'全量覆盖'。表现为要求蒸馏所有历史对话、要求DeepSeek全量导出。\n\n【证据链】'蒸馏所有历史对话'→DeepSeek官方全量导出589条对话→'其他历史对话蒸馏没有'→要求补全。","wiki_description":"","baidu_description":""},{"id":"n14","label":"AI编排能力","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】将AI视为可编排的资源而非单一工具。能设计多层AI协作架构——让AI监控AI、AI调度AI。\n\n【证据链】'帮我看着mimo做事，它不会了或者没动了就输入指令让他继续'→CodeWhale子agent并行工作→automation定时触发蒸馏。三层嵌套：用户→CodeWhale→mimo/sub-agents。","wiki_description":"","baidu_description":""},{"id":"n15","label":"渐进式构建","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】不试图一次性完成所有工作，而是分阶段逐步构建——每阶段为下一阶段奠基。这是工程思维的体现。\n\n【证据链】D4-D5强化：DeepSeek 16个月(学习期)→CodeWhale(构建期)→元认知系统(升华期)。三天内从环境配置→工具链→蒸馏管线，每步自然递进。","wiki_description":"","baidu_description":""},{"id":"n16","label":"持久化主线","type":"meta","depth":1,"confidence":"certain","summary":"【元认知含义】贯穿所有会话的深层需求——希望配置、知识、系统能够持久化而非一次性。这是'投入需要回报'的认知经济思维。\n\n【证据链】最强证据：16个月持续使用DeepSeek(589条对话)。Day1:'每次重启自动调用'→Day2:'整合到D盘'→Day3:'后台定时运行'。同一需求在三种场景下重复表达。","wiki_description":"","baidu_description":""},{"id":"n17","label":"记忆化思维","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】将认知效率策略外化为AI指令——用户有自己的'认知缓存'概念，并主动要求AI实现类似机制。\n\n【证据链】'之前出现过就不需要再出现了，记忆化剪枝那样你懂吗'——这是一个高度抽象的认知策略，用户不仅自己使用，还将其传授给AI。","wiki_description":"","baidu_description":""},{"id":"n18","label":"角色边界意识","type":"meta","depth":1,"confidence":"likely","summary":"【元认知含义】在与AI交互时明确设定角色和权限边界——不是模糊的'帮我做'，而是精细的'在这个角色下、用这个权限、做这件事'。\n\n【证据链】'只读不改，你只有总结的权力'→'入行嵌入式开发20年的老手'→'你删给你权限'。边界设定从严格(只读)→宽松(可删除)，在不同场景下精确调整。","wiki_description":"","baidu_description":""},{"id":"n19","label":"真实搜索偏好","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】对AI能力边界的清醒认知——区分AI的记忆(训练数据)和实时搜索。要求后者而非前者，表明用户理解LLM的工作方式。\n\n【证据链】'重新再搜索再评估，不是在你训练数据中的'——明确区分训练数据和实时搜索，对AI输出的来源有追问意识。","wiki_description":"","baidu_description":""},{"id":"n20","label":"多工具生态构建","type":"domain","depth":0,"confidence":"certain","summary":"【元认知含义】不依赖单一工具，而是构建一个相互配合的工具生态系统。每个工具各司其职，通过编排层协同工作。\n\n【证据链】D4-D5扩展：DeepSeek(学习平台)+CodeWhale(构建平台)+mimo(被编排AI)+cloudcode(开发工具)+FreeLLMAPI(API代理)+less-tokens(优化工具)。六工具协同。","wiki_description":"","baidu_description":""},{"id":"n21","label":"长期AI依赖","type":"meta","depth":1,"confidence":"certain","summary":"【元认知含义】AI已深度嵌入用户的工作流和思维过程——16个月的使用不是偶尔尝试，而是形成了稳定的AI增强认知模式。\n\n【证据链】DeepSeek: 2025-02-09至今，589条对话，2679条消息(chat 3398 / reasoner 2123)。CodeWhale: 2026-06-11至今，多次session持续构建。AI使用已从工具升级为外脑。","wiki_description":"","baidu_description":""},{"id":"n22","label":"多模型切换","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】根据任务复杂度在deepseek-chat(快)和deepseek-reasoner(深)之间切换——理解不同模型的能力差异并加以利用。\n\n【证据链】chat用于日常学习(3398条)，reasoner用于深度推理(2123条)。模型选择反映任务分层：学习用轻量模型，设计用深度模型。","wiki_description":"","baidu_description":""},{"id":"n23","label":"技术深度优先","type":"domain","depth":0,"confidence":"certain","summary":"【元认知含义】在AI使用中，技术话题占据主导(39%)，尤其集中在嵌入式开发领域。AI主要用于技术学习和问题解决，而非闲聊或通用查询。\n\n【证据链】1049/2679条技术消息。具体领域：嵌入式(STM32+RK3568) > Python > 电路 > 算法 > 系统设计。","wiki_description":"","baidu_description":""},{"id":"n24","label":"学习→构建进化","type":"meta","depth":1,"confidence":"likely","summary":"【元认知含义】用户与AI的关系经历了从'学生'(学习基础)到'工程师'(解决具体问题)到'架构师'(设计系统)的进化。\n\n【证据链】早期(2025-02)：Python基础语法、C语言、电路原理→中期：RK3568驱动、RTT系统、AD7606代码审查→近期(2026-06)：元认知蒸馏系统、agent编排、自动化管道。","wiki_description":"","baidu_description":""},{"id":"n25","label":"项目结构优化迭代","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】持续优化项目目录结构和文件组织——不只是初始设置，而是迭代性地改进。表现为从临时目录迁移到固定D盘路径，从单文件到多模块结构。\n\n【证据链】workspace迁移: C盘临时→D:/github/RK...→D:/ai项目/metacog-distiller。要求reorganize/clean/optimize项目结构多次。","wiki_description":"","baidu_description":""},{"id":"n26","label":"自动化依赖","type":"meta","depth":1,"confidence":"certain","summary":"【元认知含义】将自动化视为基础设施而非可选功能——要求一切重复操作写入automation/skill，拒绝手动触发。这是set-and-forget偏好的强化版。\n\n【证据链】'更新HTML变成自动化流程'——要求将HTML生成纳入automation。乱码修复后要求'更新skill防止再生'。系统性地将每次手动操作转化为自动化规则。","wiki_description":"","baidu_description":""},{"id":"n27","label":"编码质量意识","type":"tool_use","depth":1,"confidence":"likely","summary":"【元认知含义】对输出质量的系统关注——不只是'能用就行'，而是追求零乱码、正确渲染、跨平台兼容。发现编码问题后逐层debug而非接受workaround。\n\n【证据链】乱码问题反复追问：'html还是看不了！'→要求逐层debug→更新skill防止再生。从Unicode控制字符过滤到CJK字体栈到innerHTML安全清洗，全链路质量保障。","wiki_description":"","baidu_description":""},{"id":"n28","label":"技术栈文档化","type":"strategy","depth":1,"confidence":"likely","summary":"【元认知含义】将调试经验和架构决策主动写入skill/文档——不是被动记录，而是主动将经验转化为可复用的知识资产。体现'记忆化思维'在工程层面的实践。\n\n【证据链】要求将debug经验和技术细节写入skill：'更新skill防止再生'→将Unicode处理管线、CJK字体栈配置、build_final_html架构写入skill文档。","wiki_description":"","baidu_description":""}],"edges":[{"source":"n7","target":"n1","type":"influences","label":"可视化需求驱动收敛"},{"source":"n2","target":"n4","type":"supports","label":"高自主性→工具控制欲"},{"source":"n1","target":"n8","type":"supports","label":"收敛驱动系统集成"},{"source":"n2","target":"n8","type":"supports","label":"自主性驱动自动化"},{"source":"n3","target":"n1","type":"supports","label":"快速切换支持收敛"},{"source":"n6","target":"n8","type":"influences","label":"验证保障自动化质量"},{"source":"n5","target":"n7","type":"influences","label":"蒸馏意识深化可视化"},{"source":"n9","target":"n1","type":"supports","label":"并行加速收敛"},{"source":"n9","target":"n8","type":"supports","label":"并行支持集成"},{"source":"n10","target":"n8","type":"supports","label":"架构驱动集成"},{"source":"n10","target":"n1","type":"influences","label":"架构需要收敛决策"},{"source":"n11","target":"n1","type":"influences","label":"先查后建加速收敛"},{"source":"n12","target":"n2","type":"supports","label":"set-and-forget是自主性终态"},{"source":"n12","target":"n4","type":"supports","label":"set-and-forget需要控制"},{"source":"n13","target":"n8","type":"influences","label":"完整性推动系统化"},{"source":"n13","target":"n6","type":"influences","label":"完整性驱动验证"},{"source":"n5","target":"n10","type":"influences","label":"蒸馏催生架构"},{"source":"n15","target":"n8","type":"supports","label":"渐进构建→系统集成"},{"source":"n15","target":"n1","type":"supports","label":"渐进过程体现收敛"},{"source":"n15","target":"n20","type":"derives_from","label":"渐进构建产出工具生态"},{"source":"n16","target":"n15","type":"influences","label":"持久化驱动渐进构建"},{"s
