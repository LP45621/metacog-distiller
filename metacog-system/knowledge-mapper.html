<script>
const w=window.innerWidth-360,h=window.innerHeight-32;
const svg=d3.select("#graph").attr("width",w).attr("height",h);
const g=svg.append("g");
const zoom=d3.zoom().scaleExtent([0.1,4]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);
const color=d3.scaleOrdinal().domain(["concept","tool","skill","project","insight","fact"]).range(["#3fb950","#8b949e","#d29922","#f85149","#e3b341","#bc8cff"]);
const sim=d3.forceSimulation(ed.nodes).force("link",d3.forceLink(ed.edges).id(d=>d.id).distance(100)).force("charge",d3.forceManyBody().strength(-250)).force("center",d3.forceCenter(w/2,h/2)).force("collide",d3.forceCollide(35));
const link=g.append("g").selectAll("line").data(ed.edges).join("line").attr("stroke","#30363d").attr("stroke-width",1.2);
const node=g.append("g").selectAll("g").data(ed.nodes).join("g").call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
node.append("circle").attr("r",d=>d.depth===0?14:8).attr("fill",d=>color(d.type)).attr("stroke","#0d1117").attr("stroke-width",1.5);
node.append("text").text(d=>d.label).attr("class","node-label").attr("dy",d=>d.depth===0?20:14);
node.on("click",(e,d)=>{const info=document.getElementById("info");const wiki=document.getElementById("wiki");info.innerHTML=`<b>${d.label}</b><br><span style="color:#8b949e;font-size:11px">${d.type} · depth:${d.depth} · 置信度:${d.confidence}</span><br><br>${d.summary||"暂无详情"}`;wiki.innerHTML=d.wiki_description?`<b>Wiki:</b> ${d.wiki_description}`+(d.baidu_description?`<br><b>百度:</b> ${d.baidu_description}`:""):"";});
sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`);});
</script>
